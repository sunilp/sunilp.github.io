<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Not Found — Sunil Prakash</title>
  <link rel="icon" type="image/png" href="/img/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "IBM Plex Sans", -apple-system, sans-serif;
      color: #1a1a1a;
      background: #fafaf8;
      padding: 24px;
    }
    main { width: min(520px, 100%); }
    .code {
      font-size: 12px;
      color: #999;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 28px;
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    p { color: #6b6b6b; font-size: 15px; line-height: 1.7; max-width: 44ch; }
    .links { margin-top: 28px; display: flex; gap: 24px; }
    .links a {
      font-size: 14px;
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #e8e8e8;
      padding-bottom: 2px;
    }
    .links a:hover { border-color: #1a1a1a; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page does not exist.</h1>
    <p>The link may be outdated. Try the homepage or one of the pages below.</p>
    <div class="links">
      <a href="/">Home</a>
      <a href="/writing/">Writing</a>
      <a href="/portfolio/">Portfolio</a>
    </div>
  </main>
</body>
</html>
