<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found | Sunil Prakash</title>
  <link rel="icon" type="image/png" href="img/icon.png" />
  <style>
    :root {
      --bg: #f6f7f3;
      --panel: #ffffff;
      --text: #16242a;
      --muted: #5e6f73;
      --border: #d9e1df;
      --brand: #0f4c5c;
      --shadow: 0 10px 34px rgba(14, 40, 48, 0.09);
      --radius: 20px;
      --body: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--body);
      color: var(--text);
      background:
        radial-gradient(900px 420px at 10% 10%, rgba(199, 125, 43, 0.1), transparent 68%),
        radial-gradient(1000px 600px at 90% -15%, rgba(15, 76, 92, 0.12), transparent 70%),
        linear-gradient(180deg, #f8faf8 0%, #f4f5ef 100%);
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .code {
      font-size: 12px;
      color: #2f5c64;
      background: #ebf3f2;
      border: 1px solid #d2e4e2;
      border-radius: 999px;
      display: inline-block;
      padding: 6px 10px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.1;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 50ch;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      background: #fff;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--brand);
      background: linear-gradient(160deg, #0f4c5c 0%, #136476 100%);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>This page does not exist.</h1>
    <p>
      The link may be outdated after the site refresh. Use the homepage to access the latest profile and leadership summary.
    </p>
    <div class="actions">
      <a class="btn primary" href="/">Back to Homepage</a>
      <a class="btn" href="https://www.linkedin.com/in/sunilprakash" target="_blank" rel="noopener">LinkedIn</a>
      <a class="btn" href="https://www.linkedin.com/in/sunilprakash" target="_blank" rel="noopener">View LinkedIn</a>
    </div>
  </main>
</body>
</html>
